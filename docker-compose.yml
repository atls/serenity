services:
  traefik:
    image: traefik:1.7
    command: --configFile=/config/traefik/traefik.toml
    ports:
      - ${TRAEFIK_HTTP_PORT:-18880}:80
      - ${TRAEFIK_HTTPS_PORT:-18443}:443
    volumes:
      - ./config/traefik:/config/traefik:ro
      - ./.data/traefik/certs:/certs:ro
    networks:
      default:
      traefik:
        ipv4_address: 172.16.101.99

  yarn:
    image: node:22.22.2
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - ${HOME}/.yarn/berry/cache:/root/.yarn/berry/cache
    entrypoint: yarn

  elastic:
    image: elasticsearch:7.17.0
    mem_limit: 512m
    environment:
      - xpack.security.transport.ssl.enabled=false
      - xpack.security.enabled=false
      - xpack.ml.enabled=false
      - ingest.geoip.downloader.enabled=false
      - discovery.type=single-node
      - bootstrap.memory_lock=false
      - node.store.allow_mmap=false
      - ES_JAVA_OPTS=-Xms128m -Xmx128m
    ports:
      - 9200:9200
      - 9300:9300

  mailhog:
    image: mailhog/mailhog
    logging:
      driver: none
    ports:
      - 8025:8025

  redis:
    image: redis

  rabbitmq:
    build:
      context: ./config/rabbitmq/
      dockerfile: ./Dockerfile
    ports:
      - 4369:4369
      - 5671:5671
      - 5672:5672
      - 15672:15672
    environment:
      - RABBITMQ_DEFAULT_USER=local
      - RABBITMQ_DEFAULT_PASS=password

  s3:
    image: minio/minio
    volumes:
      - ./.data:/data
    environment:
      - MINIO_ACCESS_KEY=accesskey
      - MINIO_SECRET_KEY=secretkey
    command: server data
    labels:
      - 'traefik.frontend.rule=Host:s3.serenity.local.atls.tech'
      - 'traefik.protocol=http'
      - 'traefik.port=9000'
    depends_on:
      - traefik
    networks:
      - default
      - traefik

  db:
    image: alpine/socat
    command: tcp-listen:5432,fork,reuseaddr tcp-connect:host.docker.internal:${LOCAL_POSTGRES_PORT:-26482}
    restart: unless-stopped
    extra_hosts:
      - 'host.docker.internal:host-gateway'

  kratos-migrate:
    depends_on:
      - db
    image: oryd/kratos:v0.8.2-alpha.1
    environment:
      - DSN=${ORY_DSN:-postgres://postgres:password@db:5432/db?sslmode=disable&max_conns=20&max_idle_conns=4}
    volumes:
      - type: bind
        source: ./config/ory/kratos
        target: /config/kratos
    command: -c /config/kratos/kratos.yml migrate sql -e --yes
    restart: on-failure

  kratos:
    depends_on:
      - kratos-migrate
      - mailslurper
      - db
    image: oryd/kratos:v0.8.2-alpha.1
    ports:
      - '4433:4433'
      - '4434:4434'
    restart: unless-stopped
    environment:
      - DSN=${ORY_DSN:-postgres://postgres:password@db:5432/db?sslmode=disable&max_conns=20&max_idle_conns=4}
      - LOG_LEVEL=trace
    command: serve -c /config/kratos/kratos.yml --dev --watch-courier
    volumes:
      - type: bind
        source: ./config/ory/kratos
        target: /config/kratos

  mailslurper:
    image: oryd/mailslurper:latest-smtps
    ports:
      - '4436:4436'
      - '4437:4437'

  oathkeeper:
    image: oryd/oathkeeper:v0.38.2-beta.1
    command: serve serve --config /config/oathkeeper/config.yaml
    volumes:
      - ./config/ory:/config
    environment:
      - DATABASE_URL=${ORY_DSN:-postgres://postgres:password@db:5432/db?sslmode=disable&max_conns=20&max_idle_conns=4}
    restart: unless-stopped
    labels:
      - 'traefik.site.frontend.rule=Host:serenity.local.atls.tech'
      - 'traefik.admin.frontend.rule=Host:admin.serenity.local.atls.tech'
      - 'traefik.cabinet.frontend.rule=Host:cabinet.serenity.local.atls.tech'
      - 'traefik.public_gateway.frontend.rule=Host:public-gateway.serenity.local.atls.tech'
      - 'traefik.private_gateway.frontend.rule=Host:private-gateway.serenity.local.atls.tech'
      - 'traefik.port=4455'
    depends_on:
      - traefik
      - db
    networks:
      - default
      - traefik

  site:
    image: node:22.22.2-alpine
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - modules:/workspace/node_modules
      - ${HOME}/.yarn/berry/cache:/root/.yarn/berry/cache:ro
    entrypoint: yarn workspace @site/renderer-entrypoint dev
    environment:
      - NODE_TLS_REJECT_UNAUTHORIZED=0
      - NODE_ICU_DATA=/workspace/node_modules/full-icu
      - PUBLIC_GATEWAY_URL=${PUBLIC_GATEWAY_URL}
    depends_on:
      - oathkeeper
    profiles:
      - optional
    networks:
      - default
      - traefik
    extra_hosts:
      - 'public-gateway.local.serenity.atls.tech:172.16.101.99'

  site-local:
    image: node:22.22.2-alpine
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - modules:/workspace/node_modules
      - ${HOME}/.yarn/berry/cache:/root/.yarn/berry/cache:ro
    entrypoint: yarn workspace @site/renderer-entrypoint dev
    environment:
      - NODE_TLS_REJECT_UNAUTHORIZED=0
      - NODE_ICU_DATA=/workspace/node_modules/full-icu
      - PUBLIC_GATEWAY_URL=http://localhost:4000/
      - DEV_AUTH_TOKEN=${DEV_AUTH_TOKEN}
      - DEV_AUTH_USER=${DEV_AUTH_USER}
      - redis
    networks:
      - default
    depends_on:
      - public-gateway
    ports:
      - 3000:3000

  identity:
    image: node:22.22.2-alpine
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - modules:/workspace/node_modules
      - ${HOME}/.yarn/berry/cache:/root/.yarn/berry/cache:ro
    entrypoint: yarn workspace @identity/renderer-entrypoint dev
    environment:
      - NODE_TLS_REJECT_UNAUTHORIZED=0
      - KRATOS_PUBLIC_URL=http://kratos:4433/
      - KRATOS_BROWSER_URL=${KRATOS_BROWSER_URL:-http://localhost:4433/}
      - KRATOS_ADMIN_URL=http://kratos:4434/
      - BASE_URL=${ACCOUNTS_BASE_URL:-http://localhost:3002}
      - SESSION_COOKIE_DOMAIN=${SESSION_COOKIE_DOMAIN:-localhost}
    labels:
      - 'traefik.frontend.rule=Host:accounts.serenity.local.atls.tech'
      - 'traefik.protocol=http'
      - 'traefik.port=3000'
    depends_on:
      - traefik
      - kratos
      - redis
    networks:
      - default
      - traefik
    extra_hosts:
      - 'sso.serenity.local.atls.tech:172.16.101.99'
    ports:
      - 3002:3000

  cookie-store:
    image: node:22.22.2-alpine
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - modules:/workspace/node_modules
      - ${HOME}/.yarn/berry/cache:/root/.yarn/berry/cache:ro
    entrypoint: yarn workspace @identity/renderer-entrypoint dev
    environment:
      - NODE_TLS_REJECT_UNAUTHORIZED=0
      - OAUTH_AUTHORIZATION_URL=https://sso.serenity.local.atls.tech/oauth2/auth
      - OAUTH_TOKEN_URL=https://sso.serenity.local.atls.tech/oauth2/token
      - OAUTH_USERINFO_URL=https://sso.serenity.local.atls.tech/userinfo
      - OAUTH_CALLBACK_URL=https://accounts.serenity.local.atls.tech/callback
      - OAUTH_CLIENT_ID=app
      - OAUTH_CLIENT_SECRET=app-client-secret
    depends_on:
      - redis
    profiles:
      - optional

  email:
    image: node:22.22.2-alpine
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - modules:/workspace/node_modules
      - ${HOME}/.yarn/berry/cache:/root/.yarn/berry/cache:ro
    entrypoint: yarn workspace @email/renderer-entrypoint dev
    environment:
      - NODE_TLS_REJECT_UNAUTHORIZED=0
      - NODE_ICU_DATA=/workspace/node_modules/full-icu
      - PUBLIC_GATEWAY_URL=${PUBLIC_GATEWAY_URL}
      - WEB_VERSION_URL=https://email.serenity.local.atls.tech/s
      - ACCOUNTS_URL=https://accounts.serenity.local.atls.tech
    labels:
      - 'traefik.frontend.rule=Host:email.serenity.local.atls.tech'
      - 'traefik.protocol=http'
      - 'traefik.port=3000'
    depends_on:
      - traefik
    networks:
      - default
      - traefik

  public-gateway:
    image: node:22.22.2-alpine
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - ${HOME}/.yarn/berry/cache:/root/.yarn/berry/cache:ro
    entrypoint: yarn workspace @public-gateway/app dev
    depends_on:
      - oathkeeper
      - catalog-service
      - collaboration
      - files-service
      - portfolio
      - search-service
    ports:
      - 4000:3000

  private-gateway:
    image: node:22.22.2-alpine
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - modules:/workspace/node_modules
      - ${HOME}/.yarn/berry/cache:/root/.yarn/berry/cache:ro
    entrypoint: yarn workspace @private-gateway/app dev
    ports:
      - 3001:3000
    depends_on:
      - catalog-service

  catalog-service:
    image: node:22.22.2-alpine
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - modules:/workspace/node_modules
      - ${HOME}/.yarn/berry/cache:/root/.yarn/berry/cache:ro
    entrypoint: yarn workspace @catalog/service dev
    environment:
      - DB_HOST=${DB_HOST:-db}
      - DB_NAME=${DB_NAME:-db}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-password}
    depends_on:
      - rabbitmq
      - redis
      - db

  identity-service:
    image: node:22.22.2-alpine
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - modules:/workspace/node_modules
      - ${HOME}/.yarn/berry/cache:/root/.yarn/berry/cache:ro
    entrypoint: yarn workspace @identity/service dev
    environment:
      - KRATOS_PUBLIC_URL=http://kratos:4433/
      - DB_HOST=${DB_HOST:-db}
      - DB_NAME=${DB_NAME:-db}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-password}
    depends_on:
      - rabbitmq
      - db

  mailer-service:
    image: node:22.22.2-alpine
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - modules:/workspace/node_modules
      - ${HOME}/.yarn/berry/cache:/root/.yarn/berry/cache:ro
    entrypoint: yarn workspace @mailer/service dev
    environment:
      - DB_HOST=${DB_HOST:-db}
      - DB_NAME=${DB_NAME:-db}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-password}
    depends_on:
      - rabbitmq
      - mailhog
      - redis
      - db

  collaboration:
    image: node:22.22.2-alpine
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - ${HOME}/.yarn/berry/cache:/root/.yarn/berry/cache:ro
    entrypoint: yarn workspace @collaboration/service dev
    environment:
      - DB_HOST=${DB_HOST:-db}
      - DB_NAME=${DB_NAME:-db}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-password}
    depends_on:
      - rabbitmq
      - db
    networks:
      default:
        aliases:
          - collaboration-service

  hits:
    image: node:22.22.2-alpine
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - ${HOME}/.yarn/berry/cache:/root/.yarn/berry/cache:ro
    entrypoint: yarn workspace @hits/service dev
    environment:
      - DB_HOST=${DB_HOST:-db}
      - DB_NAME=${DB_NAME:-db}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-password}
    depends_on:
      - rabbitmq
      - db
    networks:
      default:
        aliases:
          - hits-service

  portfolio:
    image: node:22.22.2-alpine
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - ${HOME}/.yarn/berry/cache:/root/.yarn/berry/cache:ro
    entrypoint: yarn workspace @portfolio/service dev
    environment:
      - DB_HOST=${DB_HOST:-db}
      - DB_NAME=${DB_NAME:-db}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-password}
    depends_on:
      - rabbitmq
      - db
    networks:
      default:
        aliases:
          - portfolio-service

  search-service:
    image: node:22.22.2-alpine
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - ${HOME}/.yarn/berry/cache:/root/.yarn/berry/cache:ro
    entrypoint: yarn workspace @search/service dev
    environment:
      - DB_HOST=${DB_HOST:-db}
      - DB_NAME=${DB_NAME:-db}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - ELASTICSEARCH_HOST=http://elastic:9200
    depends_on:
      - rabbitmq
      - db
      - elastic

  files-service:
    image: node:22.22.2-alpine
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - modules:/workspace/node_modules
      - ${HOME}/.yarn/berry/cache:/root/.yarn/berry/cache:ro
    entrypoint: yarn workspace @files/service dev
    environment:
      - DB_HOST=${DB_HOST:-db}
      - DB_NAME=${DB_NAME:-db}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - GOOGLE_APPLICATION_CREDENTIALS=/workspace/credentials.json
      - GCS_BUCKET=${GCS_BUCKET}
      - FILES_REGION=eu-central-1
      - FILES_ENDPOINT=https://s3.serenity.local.atls.tech
      - FILES_ACCESS_KEY=accesskey
      - FILES_SECRET_KEY=secretkey
      - FILES_BUCKET=dev
    depends_on:
      - rabbitmq
      - s3
      - db
    extra_hosts:
      - 's3.serenity.local.atls.tech:172.16.101.99'

volumes:
  modules:
  yarncache:
  unplugged:

networks:
  traefik:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.16.101.0/24
